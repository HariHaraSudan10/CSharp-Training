<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>Question 2</title>
</head>
<body>
    <!--2. Write a JavaScript for loop that will iterate from 0 to 15. 
    For each iteration, it will check if the current number is odd or even, 
    and display a message to the screen.-->

    <h2>Odd Number or Even Number</h2>
    <div id="Output"></div>

    <script>
        for (let i = 0; i <= 15; i++) {
            if (i % 2 === 0) {
                document.getElementById("Output").innerHTML += i + " is an Even Number.<br>";
            } else {
                document.getElementById("Output").innerHTML += i + " is an Odd Number.<br>";
            }
        }
    </script>
</body>
</html>
