<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>Question 4</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <!--4. Use and write the correct selector to hide all odd table rows in a table.-->
    
    <h2>Hide Odd Table Rows</h2>
    <table style="border:1px solid black;">
        <tr>
            <td>Row 1</td>
        </tr>
        <tr>
            <td>Row 2</td>
        </tr>
        <tr>
            <td>Row 3</td>
        </tr>
        <tr>
            <td>Row 4</td>
        </tr>
        <tr>
            <td>Row 5</td>
        </tr>
        <tr>
            <td>Row 6</td>
        </tr>
        <tr>
            <td>Row 7</td>
        </tr>
        <tr>
            <td>Row 8</td>
        </tr>
        <tr>
            <td>Row 9</td>
        </tr>
        <tr>
            <td>Row 10</td>
        </tr>
    </table>

    <script>
        $(document).ready(function () {
            $("tr:even").hide();
        });
    </script>

</body>
</html>
