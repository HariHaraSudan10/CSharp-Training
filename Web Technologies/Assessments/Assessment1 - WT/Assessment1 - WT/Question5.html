<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>Question 5</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <!--5. Find all h1 elements that are children of a div element and apply a background to them.-->

    <h2>Apply Background to h1 Elements</h2>

    <div>
        <h1>I am h1</h1>
        <h2>I am h2</h2>
        <h1>I am h1</h1>
        <h3>I am h3</h3>
        <h1>I am h1</h1>
        <p>I am paragraph</p>
    </div>

    <script>
        $(document).ready(function () {
            $("div>h1").css("background-color", "green");
        });
    </script>
</body>
</html>
