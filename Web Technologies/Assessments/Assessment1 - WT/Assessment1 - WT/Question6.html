<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>Question 6</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <!--6. Write a jQuery Code to get a single element from a selection.-->

    <h2>Get a Single Element from a Selection</h2>
    <ul>
        <li>CSHARP</li>
        <li>SQL</li>
        <li>ADO</li>
    </ul>

    <script>
        $(document).ready(function () {
            $("li").click(function () {
                window.alert($(this).text() + " is Selected.");
            })
        });
    </script>

</body>
</html>
