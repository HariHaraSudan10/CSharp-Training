<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>Question 7</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <!--7. Write a jQuery Code to add a tag at the beginning of the list item, 
    containing the index of the list item Sample:-->

    <h2>Adding a tag at the beginning</h2>
    <ul>
        <li>CSHARP</li>
        <li>SQL</li>
        <li>ADO</li>
    </ul>

    <script>
        $(document).ready(function () {
            $("li").each(function (index) {
                $(this).prepend(index + "  ");
            });
        });
    </script>
</body>
</html>
